<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Save Editor</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💾</text></svg>">
</head>
<body>
<div id="lang-switch">
  <button type="button" data-lang="tr">TR</button>
  <button type="button" data-lang="en">EN</button>
</div>
<header>
  <h1>💾 Save Editor</h1>
  <p class="subtitle" data-i18n="subtitle"></p>
  <p class="formats">RPG Maker (.rpgsave, .rmmzsave, .rxdata, .rvdata, .rvdata2) · Ren'Py (.save) · Unity (.es3) · Unreal (.sav GVAS) · Godot · SQLite · Minecraft (.dat) · JSON · XML · INI · gzip/zlib/base64</p>
</header>

<main>
  <!-- Upload screen -->
  <section id="upload-screen">
    <div id="dropzone" tabindex="0">
      <div class="dz-icon">📂</div>
      <div class="dz-text"><span data-i18n="dropText"></span><br><span data-i18n="dropOr"></span></div>
      <input type="file" id="file-input" hidden>
    </div>
    <div class="upload-options">
      <label class="pw-label"><span data-i18n="passwordLabel"></span>
        <input type="password" id="password" data-i18n-placeholder="passwordPlaceholder" autocomplete="off">
      </label>
      <button id="paste-toggle" class="ghost" data-i18n="pasteToggle"></button>
    </div>
    <div id="paste-area" hidden>
      <textarea id="paste-text" data-i18n-placeholder="pastePlaceholder"></textarea>
      <button id="paste-submit" data-i18n="pasteSubmit"></button>
    </div>
    <div id="upload-error" class="error" hidden></div>
  </section>

  <!-- Editor screen -->
  <section id="editor-screen" hidden>
    <div id="file-info">
      <div class="fi-left">
        <span id="fi-name"></span>
        <span id="fi-format" class="badge"></span>
        <span id="fi-wrappers" class="badge subtle"></span>
        <span id="fi-size" class="badge subtle"></span>
      </div>
      <div class="fi-right">
        <button id="btn-view-toggle" class="ghost" data-i18n="rawJson"></button>
        <button id="btn-download" class="primary" data-i18n="download"></button>
        <button id="btn-reset" class="ghost" data-i18n="close"></button>
      </div>
    </div>
    <div id="warnings"></div>

    <div id="toolbar">
      <input type="search" id="search" data-i18n-placeholder="searchPlaceholder">
      <span id="search-filters">
        <label><input type="checkbox" id="filter-keys" checked> <span data-i18n="filterKeys"></span></label>
        <label><input type="checkbox" id="filter-values" checked> <span data-i18n="filterValues"></span></label>
        <label><input type="checkbox" id="filter-exact"> <span data-i18n="filterExact"></span></label>
      </span>
      <button id="btn-expand" class="ghost" data-i18n="expand"></button>
      <button id="btn-collapse" class="ghost" data-i18n="collapse"></button>
    </div>
    <div id="search-results" hidden></div>

    <div id="tree" class="tree"></div>

    <div id="raw-editor" hidden>
      <textarea id="raw-text" spellcheck="false"></textarea>
      <div class="raw-actions">
        <button id="raw-apply" class="primary" data-i18n="apply"></button>
        <span id="raw-error" class="error"></span>
      </div>
    </div>
  </section>
</main>

<footer>
  <p data-i18n="footer"></p>
</footer>

<script src="i18n.js"></script>
<script src="pure.js"></script>
<script src="app.js"></script>
</body>
</html>
