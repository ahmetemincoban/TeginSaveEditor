name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish win-x64
        run: dotnet publish src/SaveEditor.Web -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish-win-x64

      - name: Package
        shell: pwsh
        run: |
          Remove-Item publish-win-x64\*.pdb, publish-win-x64\appsettings.Development.json -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path publish-win-x64\* -DestinationPath "SaveEditor-${{ github.ref_name }}-win-x64.zip"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} "SaveEditor-${{ github.ref_name }}-win-x64.zip" --title "${{ github.ref_name }}" --generate-notes
